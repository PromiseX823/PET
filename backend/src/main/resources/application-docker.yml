server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:pet_platform;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: 
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  redis:
    host: localhost
    port: 6379

jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-here-for-jwt-signing-must-be-at-least-32-characters}
  expiration: 86400000

file:
  upload-dir: ./uploads/

logging:
  level:
    com.example.app: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG