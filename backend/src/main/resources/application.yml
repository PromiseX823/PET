server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/pet_platform?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false&allowInvalidDates=true&zeroDateTimeBehavior=convertToNull
    username: pet
    password: pet
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 10000ms

  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB
      max-request-size: 50MB

jwt:
  secret: your-256-bit-secret-key-here-for-jwt-signing-must-be-at-least-32-characters
  expiration: 86400000

logging:
  level:
    com.example.app: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

file:
  upload-dir: ./uploads/
