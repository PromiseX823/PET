server:
  port: 8090

spring:
  application:
    name: pet-gateway
  cloud:
    gateway:
      routes:
        - id: backend-service
          uri: http://localhost:8080
          predicates:
            - Path=/api/**,/swagger-ui/**,/v3/api-docs/**,/static/**,/uploads/**
          filters:
            - StripPrefix=0
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 100
                redis-rate-limiter.burstCapacity: 200
            - name: CORS
              args:
                allowedOrigins: "*"
                allowedMethods: "*"
                allowedHeaders: "*"
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: false
            maxAge: 3600
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-CREDENTIALS
        - name: RequestSize
          args:
            maxSize: 50MB

  data:
    redis:
      host: localhost
      port: 6379

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    reactor.netty: INFO